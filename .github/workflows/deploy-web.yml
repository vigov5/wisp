name: Build web receiver

# Compile gate for the browser (wasm) receiver. GitHub Pages is served from the
# Jekyll site in main:/docs (which hosts the privacy policy and the receiver at
# docs/pkg), so the built wasm is committed — this job just verifies it still
# builds when the Rust or web sources change. After a successful build touching
# the receiver, run `web/sync-docs.sh` locally and commit the refreshed docs/pkg.

on:
  push:
    branches: [main]
    paths:
      - "crates/web-receiver/**"
      - "crates/wire/**"
      - "web/**"
      - ".cargo/config.toml"
      - ".github/workflows/deploy-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/web-receiver/**"
      - "crates/wire/**"
      - "web/**"
  workflow_dispatch:

env:
  # iroh pulls `ring`, whose C sources compile for wasm only with clang. Point
  # cc-rs at the CI clang/llvm-ar (underscore target form — the dash form isn't
  # a valid shell identifier). Mirrors web/build.sh's NDK-clang fallback locally.
  CC_wasm32_unknown_unknown: clang
  AR_wasm32_unknown_unknown: llvm-ar
  WASM_BINDGEN_VERSION: 0.2.115 # must match the wasm-bindgen crate in Cargo.lock

jobs:
  build:
    name: Build wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-receiver

      - name: Install clang/llvm (for ring) + binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y clang llvm binaryen

      - name: Install wasm-bindgen CLI (pinned to the crate version)
        run: |
          ver="${WASM_BINDGEN_VERSION}"
          asset="wasm-bindgen-${ver}-x86_64-unknown-linux-musl"
          curl -sSL "https://github.com/rustwasm/wasm-bindgen/releases/download/${ver}/${asset}.tar.gz" | tar xz
          echo "${PWD}/${asset}" >> "${GITHUB_PATH}"

      - name: Build release wasm + bindings
        run: bash web/build.sh release
