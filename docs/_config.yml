title: Wisp
description: Peer-to-peer file sharing for any device, anywhere.
# Custom domain served at the root (docs/CNAME = web.wisp.mooo.com). baseurl is
# empty because the site is at the domain root, not under /wisp as it was on the
# github.io/wisp project URL — keeping /wisp would make Jekyll asset/theme links
# resolve to /wisp/... and 404 (e.g. the privacy policy would render unstyled).
url: https://web.wisp.mooo.com
baseurl: ""

# Internal dev/planning documents — keep them in the repo for git
# history but exclude from the published GitHub Pages site so the only
# public-facing page is the privacy policy.
exclude:
  - rename-to-wisp.md
  - deploy-rendezvous-server.md
  - upstream-bug-audit.md
  - connection-test-plan.md
