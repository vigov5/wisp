name: Flutter release (all platforms)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_RUST_BRIDGE_CODEGEN_VERSION: "2.12.0"

jobs:
  # macOS + iOS share one runner so Rust/Cargo artifacts compile once.
  macos_ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set Safe Version Name
        run: echo "SAFE_VERSION=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Force CocoaPods for plugin integration. Recent Flutter stables auto-add
      # SPM on iOS builds, but flutter_secure_storage_darwin 0.3.0 ships a
      # Package.swift declaring iOS 12 while using CryptoKit (iOS 13+), which
      # then fails to compile under SPM regardless of the Runner target. The
      # CocoaPods path picks up the Podfile's iOS 13 deployment override and
      # builds clean.
      - name: Disable Swift Package Manager for plugins
        run: flutter config --no-enable-swift-package-manager

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create macOS DMG
        run: |
          npm install --global create-dmg
          create-dmg build/macos/Build/Products/Release/Wisp.app --no-code-sign || true
          mv Wisp\ *.dmg "wisp-macos-${{ env.SAFE_VERSION }}.dmg"

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Package iOS zip
        run: |
          cd build/ios/Release-iphoneos
          zip -r "../../../wisp-ios-unsigned-${{ env.SAFE_VERSION }}.zip" Runner.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: wisp-macos
          path: flutter/wisp-macos-${{ env.SAFE_VERSION }}.dmg
          if-no-files-found: error

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: wisp-ios-unsigned
          path: flutter/wisp-ios-unsigned-${{ env.SAFE_VERSION }}.zip
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set Safe Version Name
        run: echo "SAFE_VERSION=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang cmake curl git ninja-build pkg-config unzip xz-utils zip \
            libgtk-3-dev liblzma-dev libglu1-mesa libwebkit2gtk-4.1-dev libsecret-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Linux app
        run: flutter build linux --release

      - name: Package Linux .deb
        run: |
          VERSION=$(grep "version: " pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          ARCH=$(dpkg --print-architecture)
          PACKAGE_DIR="wisp_${VERSION}_${ARCH}"
          mkdir -p "${PACKAGE_DIR}/usr/lib/wisp"
          mkdir -p "${PACKAGE_DIR}/usr/bin"
          mkdir -p "${PACKAGE_DIR}/usr/share/applications"
          mkdir -p "${PACKAGE_DIR}/usr/share/icons/hicolor/512x512/apps"
          mkdir -p "${PACKAGE_DIR}/DEBIAN"

          # Copy bundle
          cp -r build/linux/x64/release/bundle/* "${PACKAGE_DIR}/usr/lib/wisp/"

          # Create symlink
          ln -s /usr/lib/wisp/Wisp "${PACKAGE_DIR}/usr/bin/wisp"

          # Copy desktop file and icon
          cp linux/dev.vigov5.wisp.desktop "${PACKAGE_DIR}/usr/share/applications/"
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png "${PACKAGE_DIR}/usr/share/icons/hicolor/512x512/apps/dev.vigov5.wisp.png"

          # Create control file
          cat <<EOF > "${PACKAGE_DIR}/DEBIAN/control"
          Package: wisp
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: vigov5 <nguyenanhtien2210@gmail.com>
          Description: Send files to anyone, anywhere. Like AirDrop, but even more magical.
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libsecret-1-0
          EOF

          dpkg-deb --build "${PACKAGE_DIR}"
          mv "${PACKAGE_DIR}.deb" "../wisp-linux-${{ env.SAFE_VERSION }}.deb"

      - name: Package Linux zip
        run: |
          cd build/linux/x64/release
          zip -r "../../../../wisp-linux-${{ env.SAFE_VERSION }}.zip" bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: wisp-linux
          path: |
            wisp-linux-${{ env.SAFE_VERSION }}.deb
            flutter/wisp-linux-${{ env.SAFE_VERSION }}.zip
          if-no-files-found: error

      - name: Upload Linux bundle for Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: wisp-linux-bundle
          path: flutter/build/linux/x64/release/bundle
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set Safe Version Name
        run: echo "SAFE_VERSION=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Build Windows app
        run: flutter build windows --release

      - name: Build Windows Installer (Inno Setup)
        shell: pwsh
        run: |
          $version = (Get-Content pubspec.yaml | Select-String "^version: ").ToString().Split(" ")[1].Split("+")[0]
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DAppVersion=$version windows/inno_setup.iss
          Move-Item windows/wisp-windows-setup.exe "wisp-windows-setup-${{ env.SAFE_VERSION }}.exe"

      - name: Package portable Windows zip
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "build/windows/x64/runner/Release"
          $zipPath = Join-Path $PWD "wisp-windows-portable-${{ env.SAFE_VERSION }}.zip"
          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $zipPath -Force

      - name: Upload Windows Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: wisp-windows-setup
          path: flutter/wisp-windows-setup-${{ env.SAFE_VERSION }}.exe
          if-no-files-found: error

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: wisp-windows-portable
          path: flutter/wisp-windows-portable-${{ env.SAFE_VERSION }}.zip
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            flutter
            crates
            Cargo.toml
            Cargo.lock

      - name: Set Safe Version Name
        run: echo "SAFE_VERSION=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-expand,flutter_rust_bridge_codegen@${{ env.FLUTTER_RUST_BRIDGE_CODEGEN_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter_rust_bridge_codegen generate

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing — release APK would be debug-signed."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/wisp-release.jks
          cat > android/key.properties <<EOF
          storeFile=wisp-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android APK
        run: flutter build apk --release

      - name: Package Android APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "wisp-android-${{ env.SAFE_VERSION }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: wisp-android
          path: flutter/wisp-android-${{ env.SAFE_VERSION }}.apk
          if-no-files-found: error

  flatpak:
    name: "Build Flatpak"
    needs: [linux]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-45
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Safe Version Name
        run: echo "SAFE_VERSION=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: wisp-linux-bundle
          path: flutter/build/linux/x64/release/bundle

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: wisp-${{ env.SAFE_VERSION }}.flatpak
          manifest-path: flutter/linux/dev.vigov5.wisp.yaml
          cache: false
          branch: main
          upload-artifact: false

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: wisp-flatpak
          path: wisp-${{ env.SAFE_VERSION }}.flatpak
          if-no-files-found: error

  create_release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos_ios, linux, windows, android, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release-dist
          find artifacts -name "*.zip" -exec mv {} release-dist/ \;
          find artifacts -name "*.exe" -exec mv {} release-dist/ \;
          find artifacts -name "*.apk" -exec mv {} release-dist/ \;
          find artifacts -name "*.dmg" -exec mv {} release-dist/ \;
          find artifacts -name "*.flatpak" -exec mv {} release-dist/ \;
          find artifacts -name "*.deb" -exec mv {} release-dist/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
