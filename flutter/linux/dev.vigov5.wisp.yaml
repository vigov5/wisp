app-id: dev.vigov5.wisp
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: Wisp
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-download
modules:
  - name: wisp
    buildsystem: simple
    build-commands:
      - install -d /app/bin
      - cp -r * /app/bin/
      - install -D dev.vigov5.wisp.desktop /app/share/applications/dev.vigov5.wisp.desktop
      - install -D dev.vigov5.wisp.png /app/share/icons/hicolor/512x512/apps/dev.vigov5.wisp.png
    sources:
      - type: dir
        path: ../build/linux/x64/release/bundle
      - type: file
        path: dev.vigov5.wisp.desktop
      - type: file
        path: ../macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png
        dest-filename: dev.vigov5.wisp.png
